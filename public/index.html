<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello! HNU</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>

  <!-- ========== Toast ========== -->
  <div class="toast" id="toast"></div>

  <!-- ========== Auth Page ========== -->
  <div class="auth-page" id="authPage">
    <div class="auth-container">
      <h1>Hello! HNU</h1>
      <p class="auth-subtitle">与好友畅聊，随时保持联系</p>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">注册</button>
      </div>

      <div class="auth-error" id="authError"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>账号</label>
          <input type="text" id="loginUsername" placeholder="请输入账号" autocomplete="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary">登录</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>账号</label>
          <input type="text" id="regUsername" placeholder="至少3个字符" autocomplete="username">
        </div>
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="regNickname" placeholder="给自己取个名字">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="regPassword" placeholder="至少6个字符" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <input type="password" id="regPassword2" placeholder="再次输入密码" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary">注册</button>
      </form>
    </div>
  </div>

  <!-- ========== Main App ========== -->
  <div class="app-page" id="appPage">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Hello! HNU</h2>
        <div class="sidebar-actions">
          <button class="icon-btn" onclick="openVoiceRooms()" title="语音房间">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button class="icon-btn" onclick="openSearchPanel()" title="添加好友">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </button>
          <button class="icon-btn" onclick="openQRPanel()" title="我的二维码">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><line x1="21" y1="14" x2="21" y2="14.01"/><line x1="21" y1="21" x2="21" y2="21.01"/><line x1="17" y1="21" x2="17" y2="21.01"/></svg>
          </button>
        </div>
      </div>

      <div class="sidebar-search">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" placeholder="搜索好友" id="sidebarSearch" oninput="filterContacts()">
      </div>

      <div class="sidebar-tabs">
        <button class="sidebar-tab active" onclick="switchSidebarTab('chats')">
          消息
          <span class="badge" id="chatBadge" style="display:none">0</span>
        </button>
        <button class="sidebar-tab" onclick="switchSidebarTab('contacts')">
          通讯录
        </button>
        <button class="sidebar-tab" onclick="switchSidebarTab('voice')">
          语音房
        </button>
        <button class="sidebar-tab" onclick="switchSidebarTab('requests')">
          请求
          <span class="badge" id="requestBadge" style="display:none">0</span>
        </button>
      </div>

      <div class="contact-list" id="contactList"></div>

      <div class="profile-section" id="profileSection" onclick="openProfilePanel()">
        <div class="avatar sm" id="profileAvatar"></div>
        <div class="profile-name">
          <h4 id="profileName"></h4>
          <p id="profileId"></p>
        </div>
        <button class="logout-btn" onclick="event.stopPropagation(); handleLogout()" title="退出登录">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
      <div class="no-selection" id="noSelection">
        <div class="no-selection-icon">💬</div>
        <p>选择一个对话开始聊天</p>
      </div>

      <!-- Chat View -->
      <div id="chatView" style="display:none; flex-direction:column; flex:1; min-height:0;">
        <div class="chat-header">
          <button class="mobile-back-btn" onclick="closeChatMobile()" title="返回">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="chat-header-info">
            <div class="avatar sm" id="chatAvatar"></div>
            <div>
              <div class="chat-header-name" id="chatName"></div>
              <div class="chat-header-status" id="chatStatus"></div>
            </div>
          </div>
          <div class="chat-header-actions">
            <button class="icon-btn" onclick="startVoiceCall()" title="语音通话">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </button>
          </div>
        </div>

        <div class="messages-container" id="messagesContainer"></div>

        <div class="message-input-area">
          <input type="text" id="messageInput" placeholder="输入消息..." onkeydown="handleMessageKey(event)" autocomplete="off">
          <button class="send-btn" onclick="sendMessage()" id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== Search / Add Friend Panel ========== -->
  <div class="panel-overlay" id="searchPanel">
    <div class="panel">
      <button class="panel-close" onclick="closePanel('searchPanel')">&times;</button>
      <h3>添加好友</h3>
      <div class="form-group">
        <input type="text" id="searchInput" placeholder="输入账号或昵称搜索..." oninput="searchUsers()" autocomplete="off">
      </div>
      <div id="searchResults">
        <p style="color:var(--text-tertiary); text-align:center; padding:24px 0;">输入关键词搜索用户</p>
      </div>
    </div>
  </div>

  <!-- ========== QR Code Panel ========== -->
  <div class="panel-overlay" id="qrPanel">
    <div class="panel">
      <button class="panel-close" onclick="closePanel('qrPanel')">&times;</button>
      <h3>我的名片</h3>
      <div class="qr-panel-content">
        <div class="avatar lg" id="qrAvatar"></div>
        <div class="qr-user-info">
          <h4 id="qrName"></h4>
          <p id="qrId"></p>
        </div>
        <img id="qrImage" src="" alt="二维码名片" style="display:none">
        <p style="font-size:13px; color:var(--text-tertiary);">让对方扫描此二维码添加你为好友</p>
      </div>
    </div>
  </div>

  <!-- ========== Voice Call Overlay ========== -->
  <div class="call-overlay" id="callOverlay">
    <div class="call-avatar" id="callAvatar"></div>
    <div class="call-name" id="callName"></div>
    <div class="call-status" id="callStatus">正在呼叫...</div>
    <div class="call-timer" id="callTimer" style="display:none">00:00</div>
    <div class="call-actions" id="callActions"></div>
  </div>

  <!-- ========== Profile Edit Panel ========== -->
  <div class="panel-overlay" id="profilePanel">
    <div class="panel">
      <button class="panel-close" onclick="closePanel('profilePanel')">&times;</button>
      <h3>编辑资料</h3>
      <div style="text-align:center; margin-bottom:20px;">
        <div class="avatar lg" id="editProfileAvatar" style="margin:0 auto;"></div>
      </div>
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="editNickname" placeholder="输入新昵称">
      </div>
      <div class="form-group">
        <label>账号（不可修改）</label>
        <input type="text" id="editUsername" disabled style="opacity:0.5; cursor:not-allowed;">
      </div>
      <button class="btn-primary" onclick="saveProfile()">保存修改</button>
    </div>
  </div>

  <!-- ========== Voice Room Panel ========== -->
  <div class="panel-overlay" id="voiceRoomPanel">
    <div class="panel" style="width:560px;">
      <button class="panel-close" onclick="closePanel('voiceRoomPanel')">&times;</button>
      <h3>语音房间</h3>
      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="newRoomName" placeholder="房间名称..." style="flex:1; padding:10px 14px; border:1px solid var(--bg-tertiary); border-radius:var(--radius-sm); font-size:14px; font-family:var(--font); outline:none;">
        <button class="btn-add" onclick="createVoiceRoom()" style="white-space:nowrap;">创建房间</button>
      </div>
      <div id="voiceRoomList">
        <p style="color:var(--text-tertiary); text-align:center; padding:24px 0;">暂无语音房间</p>
      </div>
    </div>
  </div>

  <!-- ========== Group Voice Room Overlay ========== -->
  <div class="call-overlay" id="groupCallOverlay" style="display:none;">
    <div style="text-align:center;">
      <div class="call-name" id="groupRoomName" style="margin-bottom:4px;"></div>
      <div class="call-status" id="groupCallStatus">连接中...</div>
      <div class="call-timer" id="groupCallTimer" style="display:none; margin-top:8px;">00:00</div>
    </div>
    <div class="group-participants" id="groupParticipants"></div>
    <div class="call-actions">
      <button class="call-action-btn end-call" onclick="leaveVoiceRoom()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
